name: Aggregate report
description: 'Process downloaded artifacts (downloaded with actions/download-artifact) and produce a markdown report section'
inputs:
  package-name:
    description: 'Full package name (workspace)'
    required: true
outputs:
  report:
    description: 'Markdown report section generated by the action'
    value: ${{ steps.section-report.outputs.report }}
runs:
  using: 'composite'
  steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3

    - name: Process coverage reports
      uses: actions/github-script@v9
      id: process_test_report
      with:
        script: |
          const core = require('@actions/core');
          const processReports = require('./.github/scripts/compare-coverage.js')

          core.setOutput('message', processReports('test-report', 'test-report-base'));

    - name: Process mutation report
      uses: actions/github-script@v9
      id: process_mutation_report
      with:
        script: |
          const core = require('@actions/core');
          const processReports = require('./.github/scripts/process-mutation.js')

          core.setOutput('message', processReports('mutation-report/mutation/mutation.json', 'mutation-report/changed-files.json'));

    - name: Generate markdown report
      id: section-report
      uses: actions/github-script@v6
      env:
        TESTS_MESSAGE: ${{ steps.process_test_report.outputs.message }}
        MUTATION_MESSAGE: ${{ steps.process_mutation_report.outputs.message }}
        PACKAGE: ${{ inputs.package-name }}
      with:
        script: |
            const core = require('@actions/core');
            const generateReport = require('./.github/scripts/generate-report.js').generateReport
            const { TESTS_MESSAGE, MUTATION_MESSAGE, PACKAGE } = process.env;

            core.setOutput('report', generateReport(PACKAGE, TESTS_MESSAGE, MUTATION_MESSAGE));

    - name: Resolve pull request number
      id: resolve_pr
      uses: actions/github-script@v9
      with:
        script: |
          const core = require('@actions/core');
          const github = require('@actions/github');
          (async () => {
            const owner = github.context.repo.owner;
            const repo = github.context.repo.repo;
            let pr = (github.context.payload.pull_request && github.context.payload.pull_request.number) || github.context.issue.number;

            // try commit-associated PRs if not in context
            if (!pr) {
              const sha = github.context.sha;

              if (sha) {
                try {
                  const assoc = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
                  if (assoc && Array.isArray(assoc.data) && assoc.data.length > 0) {
                    const prObj = assoc.data.find(p => p.state === 'open') || assoc.data[0];
                    pr = prObj.number;
                  }
                } catch (e) {
                  core.info('Error while searching for PR associated with commit: ' + String(e));
                }
              }
            }

            // fallback: try to find an open PR by branch ref (refs/heads/<branch>)
            if (!pr) {
              const ref = github.context.ref || '';
              const headsPrefix = 'refs/heads/';
              if (ref.startsWith(headsPrefix)) {
                const branch = ref.slice(headsPrefix.length);
                try {
                  const pulls = await github.rest.pulls.list({ owner, repo, head: `${owner}:${branch}`, state: 'open' });
                  if (pulls && Array.isArray(pulls.data) && pulls.data.length > 0) {
                    pr = pulls.data[0].number;
                  }
                } catch (e) {
                  core.info('Error while searching for PR by branch ref: ' + String(e));
                }
              }
            }

            core.setOutput('pr-number', pr ? String(pr) : '');
          })();
    - name: Acquire comment-update lock
      id: acquire_lock
      uses: softprops/turnstyle@v2
      with:
        key: aggregated-comment-${{ steps.resolve_pr.outputs.pr-number || github.ref_name || github.ref }}
        timeout: 600

    - name: Create or update PR comment with report
      uses: actions/github-script@v6
      env:
        REPORT: ${{ steps.section-report.outputs.report }}
        PACKAGE: ${{ inputs.package-name }}
        PR_NUMBER: ${{ steps.resolve_pr.outputs.pr-number }}
      with:
        script: |
          const core = require('@actions/core');
          const updater = require('./.github/scripts/update-aggregated-comment.js');

          (async () => {
            try {
              const report = process.env.REPORT || '';
              const packageName = process.env.PACKAGE;
              const pr = process.env.PR_NUMBER || undefined;
              await updater.updateAggregatedComment(report, packageName, pr);
            } catch (err) {
              core.error(err && err.stack ? err.stack : String(err));
              throw err;
            }
          })();

    - name: Release comment-update lock
      if: ${{ always() }}
      uses: softprops/turnstyle@v2
      with:
        key: aggregated-comment-${{ steps.resolve_pr.outputs.pr-number || github.ref_name || github.ref }}
        action: 'release'
