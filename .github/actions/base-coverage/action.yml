name: Base coverage
description: "Checkout base ref, run package coverage and upload artifact"
inputs:
  package-name:
    description: 'Full package name (workspace)'
    required: true
  working-directory:
    description: 'Working directory relative to repo root (package folder)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout base ref
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.base.ref }}
        fetch-depth: 0

    - name: Check package tests exist on base ref
      id: check
      shell: bash
      run: |
        if [ -f "${{ inputs.working-directory }}/package.json" ] && jq -e '.scripts["test:coverage"]' "${{ inputs.working-directory }}/package.json" > /dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "Package not present on base ref or has no test:coverage script (new test suite), skipping base coverage"
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node
      if: steps.check.outputs.exists == 'true'
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Setup environment
      if: steps.check.outputs.exists == 'true'
      uses: ./.github/actions/setup

    - name: Build the package
      if: steps.check.outputs.exists == 'true'
      shell: bash
      run: yarn workspace ${{ inputs.package-name }} run build
      working-directory: ${{ inputs.working-directory }}

    - name: Run coverage
      if: steps.check.outputs.exists == 'true'
      shell: bash
      run: yarn workspace ${{ inputs.package-name }} test:coverage
      working-directory: ${{ inputs.working-directory }}

    - name: Upload base coverage artifact
      if: steps.check.outputs.exists == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: test-report-base
        path: |
          ${{ inputs.working-directory }}/coverage
          ${{ inputs.working-directory }}/jest-report.json
        retention-days: 3
