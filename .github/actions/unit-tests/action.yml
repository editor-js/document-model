name: Unit tests
inputs:
  working-directory:
    description: 'Path to the ./packages/name_of_your_package_folder'
    required: true
  package-name:
    description: 'A full name of the package'
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v3
      with:
        node-version-file: .nvmrc
    - uses: ./.github/actions/setup

    # ---- Base branch coverage (for comparison) ----
    - name: Checkout base branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.base_ref }}

    - uses: ./.github/actions/build
      with:
        package-name: ${{ inputs.package-name }}

    - name: Run base tests with coverage
      shell: bash
      run: yarn workspace ${{ inputs.package-name }} test:coverage
      continue-on-error: true

    - name: Save base coverage
      shell: bash
      run: |
        [ -f "${{ inputs.working-directory }}/coverage/coverage-final.json" ] && \
        cp "${{ inputs.working-directory }}/coverage/coverage-final.json" /tmp/base-coverage.json || true

    # ---- PR HEAD coverage ----
    - name: Checkout PR HEAD
      uses: actions/checkout@v4

    - uses: ./.github/actions/build
      with:
        package-name: ${{ inputs.package-name }}

    - name: Run unit tests with coverage
      shell: bash
      run: yarn workspace ${{ inputs.package-name }} test:coverage

    # Find current PR's number
    - uses: jwalton/gh-find-current-pr@v1
      id: findPr

    - name: Post coverage report
      uses: ArtiomTr/jest-coverage-report-action@v2
      continue-on-error: true
      with:
        custom-title: Coverage report for `${{ inputs.working-directory }}`
        working-directory: ${{ inputs.working-directory }}
        coverage-file: ${{ inputs.working-directory }}/coverage/coverage-final.json
        base-coverage-file: /tmp/base-coverage.json
        skip-step: all
        prnumber: ${{ steps.findPr.outputs.number }}
