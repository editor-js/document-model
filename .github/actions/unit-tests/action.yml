name: Unit tests
inputs:
  working-directory:
    description: 'Path to the ./packages/name_of_your_package_folder'
    required: true
  package-name:
    description: 'A full name of the package'
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v3
      with:
        node-version-file: .nvmrc
    - uses: ./.github/actions/setup

    # ---- Base branch coverage (for comparison) ----
    - name: Checkout base branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.base_ref }}

    - uses: ./.github/actions/build
      with:
        package-name: ${{ inputs.package-name }}

    - name: Run base tests with coverage
      shell: bash
      run: yarn workspace ${{ inputs.package-name }} test:coverage --coverageReporters=json-summary
      continue-on-error: true

    - name: Save base coverage
      shell: bash
      run: |
        [ -f "${{ inputs.working-directory }}/coverage/coverage-summary.json" ] && \
        cp "${{ inputs.working-directory }}/coverage/coverage-summary.json" /tmp/base-coverage-summary.json || true

    # ---- PR HEAD coverage ----
    - name: Checkout PR HEAD
      uses: actions/checkout@v4

    - uses: ./.github/actions/build
      with:
        package-name: ${{ inputs.package-name }}

    - name: Run unit tests with coverage
      shell: bash
      run: yarn workspace ${{ inputs.package-name }} test:coverage --coverageReporters=json-summary --coverageReporters=text

    # Find current PR's number
    - uses: jwalton/gh-find-current-pr@v1
      id: findPr

    - name: Post coverage report
      uses: MishaKav/jest-coverage-comment@main
      with:
        title: Coverage report for `${{ inputs.working-directory }}`
        coverage-summary-path: ${{ inputs.working-directory }}/coverage/coverage-summary.json
        base-coverage-summary-path: /tmp/base-coverage-summary.json
        pr-number: ${{ steps.findPr.outputs.number }}
        github-token: ${{ github.token }}
