name: Mutation tests for changed files
description: Run mutation tests for changed files for a given package

inputs:
  working-directory:
    description: 'Path to the ./packages/name_of_your_package_folder'
    required: true
  package-name:
    description: 'A full name of the package'
    required: true
  stryker_dashboard_api_key:
    description: 'Stryker dashboard api key'
    required: true

runs:
  using: "composite"
  steps:
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: ./.github/actions/build
        with:
          package-name: ${{ inputs.package-name }}

      - name: Get changed files
        # Pinned to a full SHA (v47.0.6). tj-actions/changed-files was compromised
        # in March 2025 via tag re-pointing; a moving tag re-exposes that risk.
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        id: changed-files
        with:
          files_yaml: |
            src:
              - 'src/**/*.ts'
              - '!src/**/*.spec.ts'
              - '!src/**/__mocks__/**'
          separator: ','
          path: ${{ inputs.working-directory }}

      - name: Run mutation tests
        if: steps.changed-files.outputs.src_any_changed == 'true'
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ inputs.stryker_dashboard_api_key }}
          # Via env, never inlined: these are filenames from the PR, and `${{ }}`
          # splices them into the shell — a file named `$(...)` would execute.
          CHANGED_FILES: ${{ steps.changed-files.outputs.src_all_changed_files }}
          PACKAGE_NAME: ${{ inputs.package-name }}
        shell: bash
        id: run-mutation-tests
        run: yarn workspace "$PACKAGE_NAME" test:mutations --mutate "$CHANGED_FILES" --dashboard.module "$PACKAGE_NAME"
        continue-on-error: true

      - name: Save mutated files list
        if: steps.changed-files.outputs.src_any_changed == 'true'
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.src_all_changed_files }}
        run: |
          printf '%s' "$CHANGED_FILES" | sed 's/,/","/g' | sed 's/^/["/;s/$/"]/' > changed-files.json

      - name: Save empty list if no files changed
        if: steps.changed-files.outputs.src_any_changed == 'false'
        shell: bash
        run: echo "[]" > changed-files.json

      - name: Upload mutation report artifact
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: |
            ${{ inputs.working-directory }}/reports/mutation/mutation.json
            changed-files.json
          retention-days: 3

      # reporting will be triggered by workflow_run on workflow completion

      - if: steps.changed-files.outputs.src_any_changed == 'true' && steps.run-mutation-tests.outcome == 'failure'
        shell: bash
        run: exit 1
