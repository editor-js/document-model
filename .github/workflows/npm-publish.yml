name: Publish packages to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Never publish two runs at once — concurrent `npm publish` of the same version
# races. Queue instead of cancelling: a cancelled run can leave half the
# workspaces published.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org/

      - run: corepack enable

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Build all packages
        run: yarn workspaces foreach -Apt run build

      - name: Publish changed packages
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn workspaces foreach -At --no-private npm publish --access public --tolerate-republish
